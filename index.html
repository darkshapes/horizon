<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Multi-Touch Slider Prototype</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌙</button>
    <main>
        <div class="slider-array" id="array-1">
            <div class="channel" data-channel="0" data-type="int">
                <div class="channel-track">
                    <div class="channel-indicator"></div>
                    <div class="channel-value-overlay"></div>
                </div>
                <div class="channel-display">0</div>
            </div>
            <div class="channel" data-channel="1" data-type="float">
                <div class="channel-track">
                    <div class="channel-indicator"></div>
                    <div class="channel-value-overlay"></div>
                </div>
                <div class="channel-display">0.0</div>
            </div>
            <div class="channel" data-channel="2" data-type="iterable">
                <div class="channel-track">
                    <div class="channel-indicator"></div>
                    <div class="channel-value-overlay"></div>
                </div>
                <div class="channel-display">red</div>
            </div>
            <div class="channel" data-channel="3" data-type="bool">
                <div class="channel-track">
                    <div class="channel-indicator"></div>
                    <div class="channel-value-overlay"></div>
                </div>
                <div class="channel-display">false</div>
            </div>
        </div>
        <div class="slider-array" id="array-2">
            <div class="channel" data-channel="0" data-type="int">
                <div class="channel-track">
                    <div class="channel-indicator"></div>
                    <div class="channel-value-overlay"></div>
                </div>
                <div class="channel-display">0</div>
            </div>
            <div class="channel" data-channel="1" data-type="float">
                <div class="channel-track">
                    <div class="channel-indicator"></div>
                    <div class="channel-value-overlay"></div>
                </div>
                <div class="channel-display">0.0</div>
            </div>
            <div class="channel" data-channel="2" data-type="iterable">
                <div class="channel-track">
                    <div class="channel-indicator"></div>
                    <div class="channel-value-overlay"></div>
                </div>
                <div class="channel-display">red</div>
            </div>
            <div class="channel" data-channel="3" data-type="bool">
                <div class="channel-track">
                    <div class="channel-indicator"></div>
                    <div class="channel-value-overlay"></div>
                </div>
                <div class="channel-display">false</div>
            </div>
        </div>
    </main>
    <footer>
        <small>Horizon | Darkshapes</small>
    </footer>
    <script type="module" src="src/main.js"></script>
</body>
</html>
